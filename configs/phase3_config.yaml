# Phase 3 Baseline 配置
data:
  base_dir: "data/mimic_note_extracted/note"
  radiology_file: "radiology.csv.gz"
  radiology_detail_file: "radiology_detail.csv.gz"
  discharge_file: "discharge.csv.gz"
  mimic_iv_zip: "data/mimic-iv-3.1.zip"

filtering:
  # exam_name 关键词，用于从 radiology_detail 过滤 chest CT
  chest_ct_keywords:
    - "CT CHEST"
    - "CTA CHEST"
    - "CT LOW DOSE LUNG"
    - "CT LUNG"
  # 结节关键词，用于从 radiology text 过滤含结节报告
  nodule_keywords:
    - "nodule"
    - "nodular"
    - "pulmonary nodule"
    - "lung nodule"

pipeline:
  # 小样本 demo 数量
  demo_sample_size: 50
  # 导出候选样本数量
  export_sample_size: 500
  random_seed: 42

output:
  base_dir: "outputs"
  radiology_candidates: "outputs/radiology_candidates.jsonl"
  radiology_facts: "outputs/radiology_facts.jsonl"
  smoking_results: "outputs/smoking_results.jsonl"
  case_bundles: "outputs/case_bundles.jsonl"
  recommendations: "outputs/recommendations.jsonl"
  demo_output: "outputs/phase3_demo_output.json"

versions:
  pipeline_version: "0.1.0"
  data_version: "mimic-iv-note-2.2"
  rules_version: "lung_rads_v2022_minimal_0.1"
  extractor_version: "regex_baseline_0.1"
